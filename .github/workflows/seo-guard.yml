name: SEO Guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run SEO regression checks
        run: python3 tools/verify_seo_fixes.py
